name: Release

# Fires when a version tag is pushed. git-flow tags releases as v<version>
# (e.g. v0.1.0) on main when `git flow release finish` runs, so finishing a
# release is all it takes to build and publish the binaries and the .deb.
on:
  push:
    tags: ['v*.*.*']

# The job creates a GitHub Release and uploads assets to it.
permissions:
  contents: write

jobs:
  package:
    name: build & package
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      VCPKG_ROOT: /opt/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf autoconf-archive automake bison build-essential \
            clang cmake curl flex git libtool libtool-bin m4 nasm \
            ninja-build perl pkg-config python3 tar unzip zip zlib1g-dev

      - name: Bootstrap vcpkg
        run: |
          sudo git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          sudo git -C "$VCPKG_ROOT" checkout \
            930ecc42b512b564571d767f70775d284a6fa307
          sudo "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          sudo chown -R "$USER" "$VCPKG_ROOT"
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-release-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-release-${{ runner.os }}-

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      # Produces opaquedb_<version>_amd64.deb and opaquedb-<version>-Linux.tar.gz
      # from the CPack config in CMakeLists.txt (DEB;TGZ).
      - name: Package
        run: cd build/release && cpack

      # Guard against a tag that does not match the built binary's version.
      - name: Verify version matches tag
        run: |
          ver="${GITHUB_REF_NAME#v}"
          out="$(./build/release/opaquedb --version)"
          echo "$out"
          echo "$out" | grep -q "$ver" || {
            echo "binary version does not contain tag version $ver" >&2
            exit 1
          }

      - name: Publish release with binaries and .deb
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/release/*.deb
            build/release/*.tar.gz
