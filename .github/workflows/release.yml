name: Release

# Fires when a version tag is pushed. git-flow tags releases as v<version>
# (e.g. v0.1.0) on main when `git flow release finish` runs, so finishing a
# release is all it takes to build, package, and publish.
on:
  push:
    tags: ['v*.*.*']

# The job creates a GitHub Release and uploads assets to it.
permissions:
  contents: write

jobs:
  release:
    name: build & publish
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      VCPKG_ROOT: /opt/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so release notes can diff against the previous tag.
          fetch-depth: 0

      # See ci.yml: reclaim preinstalled toolchains so the from-source vcpkg
      # build does not fill the runner disk.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          sudo docker image prune --all --force || true
          df -h /

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf autoconf-archive automake bison build-essential \
            clang cmake curl flex git libtool libtool-bin m4 nasm \
            ninja-build perl pkg-config python3 tar unzip zip zlib1g-dev

      - name: Bootstrap vcpkg
        run: |
          sudo git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          sudo git -C "$VCPKG_ROOT" checkout \
            930ecc42b512b564571d767f70775d284a6fa307
          sudo "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          sudo chown -R "$USER" "$VCPKG_ROOT"
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-release-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-release-${{ runner.os }}-

      - name: Configure
        run: make configure PRESET=release

      - name: Build
        run: make build PRESET=release

      # Produces opaquedb_<version>_<arch>.deb (full install) and
      # opaquedb_<version>_<arch>.tar.gz (binary only) from CMake/CPack.
      - name: Package
        run: make package

      # Guard against a tag that does not match the built binary's version.
      - name: Verify version matches tag
        run: |
          ver="${GITHUB_REF_NAME#v}"
          out="$(./build/release/opaquedb --version)"
          echo "$out"
          echo "$out" | grep -q "$ver" || {
            echo "binary version does not contain tag version $ver" >&2
            exit 1
          }

      # Release notes are the commit messages since the previous tag, kept to
      # the user-facing conventional-commit types. Housekeeping prefixes (ci,
      # docs, chore, test, style, refactor, build) are dropped so the notes read
      # as a changelog, not a commit dump.
      - name: Build release notes from commits
        id: notes
        run: |
          prev="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" \
            2>/dev/null || true)"
          range="${GITHUB_REF_NAME}"
          [ -n "$prev" ] && range="${prev}..${GITHUB_REF_NAME}"
          # Keep feat, fix, hotfix, perf, revert and security; an optional scope
          # and a breaking-change "!" are allowed.
          keep='^- (feat|fix|hotfix|perf|revert|security)(\(.+\))?!?: '
          changes="$(git log --no-merges --pretty='- %s' "$range" \
            | grep -E "$keep" || true)"
          {
            echo "notes<<RELEASE_NOTES_EOF"
            if [ -n "$prev" ]; then
              echo "Changes since ${prev}:"
            else
              echo "Changes:"
            fi
            echo
            if [ -n "$changes" ]; then
              echo "$changes"
            else
              echo "- No user-facing changes."
            fi
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release with binaries and .deb
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            build/release/*.deb
            build/release/*.tar.gz
