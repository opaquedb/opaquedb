name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# Cancel superseded runs on the same ref so the queue stays short.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The workflow only reads the repository.
permissions:
  contents: read

jobs:
  # Fast style gate. Runs in seconds with no build, so a formatting slip fails
  # before the expensive toolchain and vcpkg setup ever start.
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format

      - name: Check formatting
        run: make format-check

  # Configure, build, test, and run clang-tidy. Gated behind formatting so we do
  # not spend build minutes on a branch that will fail the style check anyway.
  build-and-test:
    name: build & test
    needs: format
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      VCPKG_ROOT: /opt/vcpkg
      # Cache vcpkg build artifacts between runs.
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
    steps:
      - uses: actions/checkout@v4

      # GitHub runners ship with ~14 GB free, but vcpkg builds boost, gRPC,
      # protobuf, SEAL, and etcd from source. Reclaim ~25-30 GB of preinstalled
      # toolchains we never use so the disk does not fill mid-build (a full disk
      # crashes the runner itself and aborts the vcpkg cache upload, so every
      # later run also rebuilds from scratch).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          sudo docker image prune --all --force || true
          df -h /

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf autoconf-archive automake bison build-essential \
            clang clang-tidy cmake curl flex git libtool \
            libtool-bin m4 nasm ninja-build perl pkg-config python3 \
            tar unzip zip zlib1g-dev

      - name: Bootstrap vcpkg
        run: |
          sudo git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          sudo git -C "$VCPKG_ROOT" checkout \
            930ecc42b512b564571d767f70775d284a6fa307
          sudo "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          sudo chown -R "$USER" "$VCPKG_ROOT"
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Configure
        run: make configure

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: clang-tidy
        run: make tidy
